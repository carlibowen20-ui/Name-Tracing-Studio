<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Name Tracing Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2b2b3a;
    --paper: #fbf6f3;
    --card: #ffffff;
    --line: #ece2dd;
    --accent: #f0879f;
    --accent-soft: #fde9ee;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Poppins', 'Segoe UI', sans-serif;
  }

  /* ---------- App chrome ---------- */
  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }
  .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 26px;
  }
  .brand-name {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1.1;
    min-height: 50px;
    word-break: break-word;
  }
  .brand-sub {
    font-style: italic;
    font-size: 17px;
    color: #6f6a78;
  }
  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 26px;
    align-items: start;
  }
  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ---------- Controls ---------- */
  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px;
    position: sticky;
    top: 18px;
  }
  @media (max-width: 860px) {
    .panel { position: static; }
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: .4px;
    text-transform: uppercase;
    color: #8a8494;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 11px 13px;
    font: 500 16px 'Poppins', sans-serif;
    color: var(--ink);
    border: 1.5px solid var(--line);
    border-radius: 11px;
    background: #fffdfc;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus { border-color: var(--accent); }
  .hint { font-size: 12.5px; color: #a09aa8; margin-top: 4px; }

  .swatch-row { display: flex; gap: 10px; }
  .swatch {
    --c1: #f599b0; --c2: #fed4de; --c3: #fee195; --c4: #ade4de;
    width: 54px; height: 34px;
    border-radius: 9px;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    background:
      linear-gradient(90deg, var(--c1) 0 25%, var(--c2) 25% 50%, var(--c3) 50% 75%, var(--c4) 75% 100%);
  }
  .swatch.sel { border-color: var(--ink); }
  .swatch:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .seg { display: flex; gap: 6px; }
  .seg button {
    flex: 1;
    padding: 8px 0;
    font: 600 14px 'Poppins', sans-serif;
    color: var(--ink);
    background: #fffdfc;
    border: 1.5px solid var(--line);
    border-radius: 9px;
    cursor: pointer;
  }
  .seg button.sel {
    background: var(--accent-soft);
    border-color: var(--accent);
  }

  .print-btn {
    width: 100%;
    margin-top: 6px;
    padding: 14px 0;
    font: 700 16px 'Poppins', sans-serif;
    letter-spacing: .3px;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform .08s, background .15s;
  }
  .print-btn:hover { background: #e9758f; }
  .print-btn:active { transform: scale(.985); }
  .print-note {
    font-size: 12.5px;
    color: #a09aa8;
    text-align: center;
    margin-top: 9px;
  }

  /* ---------- Preview sheets ---------- */
  .sheets { display: flex; flex-direction: column; gap: 26px; }
  .sheet {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 1px 3px rgba(43,43,58,.10), 0 10px 28px rgba(43,43,58,.10);
    overflow: hidden;
  }
  .sheet svg { display: block; width: 100%; height: auto; }
  .empty-state {
    border: 2px dashed var(--line);
    border-radius: 18px;
    padding: 70px 30px;
    text-align: center;
    color: #a09aa8;
    font-size: 16px;
  }
  .empty-state b { color: var(--ink); }

  /* ---------- Print ---------- */
  @media print {
    @page { size: 8.5in 11in; margin: 0; }
    body { background: #fff; }
    .app { max-width: none; padding: 0; }
    .brand, .panel { display: none !important; }
    .layout { display: block; }
    .sheets { gap: 0; }
    .sheet {
      box-shadow: none;
      border-radius: 0;
      width: 8.5in;
      height: 11in;
      page-break-after: always;
    }
    .sheet:last-child { page-break-after: avoid; }
    .sheet svg { width: 8.5in; height: 11in; }
    .empty-state { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="brand">
    <div class="brand-name" id="brandName" aria-live="polite"></div>
    <div class="brand-sub">Name Tracing Studio &mdash; type a name, print the worksheet packet</div>
  </div>

  <div class="layout">
    <div class="panel">
      <div class="field">
        <label for="first">First name</label>
        <input id="first" type="text" value="" maxlength="14" autocomplete="off" placeholder="Type a name…">
      </div>
      <div class="field">
        <label for="middle">Middle name <span style="text-transform:none;font-weight:400">(optional)</span></label>
        <input id="middle" type="text" value="" maxlength="14" autocomplete="off">
      </div>
      <div class="field">
        <label for="last">Last name <span style="text-transform:none;font-weight:400">(optional)</span></label>
        <input id="last" type="text" value="" maxlength="14" autocomplete="off">
      </div>

      <div class="field">
        <label>Color theme</label>
        <div class="swatch-row" id="swatches" role="radiogroup" aria-label="Color theme"></div>
      </div>

      <div class="field">
        <label>Letter style</label>
        <div class="seg" id="styleSeg">
          <button data-style="dash" class="sel">Dashes</button>
          <button data-style="dot">Dots</button>
          <button data-style="cursive">Cursive</button>
        </div>
      </div>

      <div class="field">
        <label>Practice lines per page</label>
        <div class="seg" id="lineSeg"></div>
      </div>

      <div class="field">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; text-transform:none; font-size:14px; font-weight:500; color:var(--ink);">
          <input type="checkbox" id="alphaToggle" style="width:16px; height:16px; accent-color:var(--accent);">
          Add alphabet practice pages
        </label>
      </div>

      <div class="field" id="addrField">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; text-transform:none; font-size:14px; font-weight:500; color:var(--ink);">
          <input type="checkbox" id="addrToggle" style="width:16px; height:16px; accent-color:var(--accent);">
          Add address &amp; phone practice
        </label>
        <div id="addrInputs" style="display:none; margin-top:10px;">
          <input id="street" type="text" maxlength="34" autocomplete="off" placeholder="Street address" style="margin-bottom:8px;">
          <div style="display:flex; gap:8px; margin-bottom:8px;">
            <input id="city" type="text" maxlength="22" autocomplete="off" placeholder="City" style="flex:2;">
            <input id="stateAb" type="text" maxlength="2" autocomplete="off" placeholder="ST" style="flex:1; text-transform:uppercase;">
            <input id="zip" type="text" maxlength="10" autocomplete="off" placeholder="ZIP" style="flex:1;">
          </div>
          <input id="phone" type="text" maxlength="16" autocomplete="off" placeholder="Phone (optional)">
        </div>
      </div>

      <button class="print-btn" id="printBtn">Print worksheets</button>
      <div class="print-note">In the print dialog, choose &ldquo;Save as PDF&rdquo; to keep a copy.</div>
      <div class="hint" id="charWarn" style="color:#d4708a; display:none; margin-top:10px;"></div>

      <div style="margin-top:18px; border-top:1px solid var(--line); padding-top:16px;">
        <div style="font-size:12.5px; font-weight:600; letter-spacing:.4px; text-transform:uppercase; color:#8a8494; margin-bottom:6px;">Bulk / Class List</div>
        <div style="font-size:12px; color:#a09aa8; margin-bottom:10px;">All settings above apply to every student. Address columns in the CSV override the shared address fields per student.</div>

        <textarea id="bulkInput" rows="5" placeholder="Alice&#10;Bob Smith&#10;Carol Jean Jones&#10;— or upload a CSV —" style="width:100%; padding:10px 12px; font:13px 'Poppins',sans-serif; color:var(--ink); border:1.5px solid var(--line); border-radius:11px; resize:vertical; outline:none; background:#fffdfc; box-sizing:border-box;"></textarea>

        <div style="display:flex; gap:7px; margin-top:8px;">
          <label style="flex:1; display:flex; align-items:center; justify-content:center; gap:5px; padding:8px 0; font:600 12px 'Poppins',sans-serif; color:var(--ink); background:#fffdfc; border:1.5px solid var(--line); border-radius:9px; cursor:pointer;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload CSV
            <input type="file" id="bulkFile" accept=".csv,.txt" style="display:none">
          </label>
          <button id="sampleCsvBtn" style="flex:1; display:flex; align-items:center; justify-content:center; gap:5px; padding:8px 0; font:600 12px 'Poppins',sans-serif; color:var(--ink); background:#fffdfc; border:1.5px solid var(--line); border-radius:9px; cursor:pointer;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Sample CSV
          </button>
          <button id="bulkClear" style="padding:8px 12px; font:600 12px 'Poppins',sans-serif; color:#a09aa8; background:#fffdfc; border:1.5px solid var(--line); border-radius:9px; cursor:pointer;">Clear</button>
        </div>
        <div id="bulkCount" style="font-size:12px; color:#a09aa8; margin-top:6px; display:none;"></div>
      </div>
    </div>

    <div class="sheets" id="sheets"></div>
  </div>
</div>

// Cursive outline rendering. Font upm 2048; x-height ~627 maps to worksheet XH (470).
const CUR_UPM = CURSIVE.upm;
const CUR_CAPH = 647;            // measured ascender/cap height of Learning Curve Bold
const CUR_SCALE_TO_WS = 700 / CUR_CAPH;   // cursive units -> worksheet units, fit cap height within ASC

const CUR_GAP = 110;             // extra spacing between letters (cursive units) for disconnected look

function cursiveLayout(text, disconnected = false) {
  // Returns { paths:[d,...], width } in worksheet units, baseline y=0, up-positive.
  let x = 0;
  const paths = [];
  const k = CUR_SCALE_TO_WS;     // cursive font units -> worksheet units
  const gap = disconnected ? CUR_GAP : 0;
  for (const ch of text) {
    const g = CURSIVE.glyphs[ch];
    if (!g) { x += 300 * k; continue; }
    const [adv, d] = g;
    if (d) paths.push({ d, x });
    x += (adv + (ch === ' ' ? 0 : gap)) * k;
  }
  return { paths, width: x, k };
}

function cursiveFragment(text, S, color = '#d0d0d0', disconnected = false) {
  // Renders each glyph as a filled, light-gray silhouette (single shape to trace),
  // instead of a stroked dashed outline (which doubled every stroke edge).
  const k = CUR_SCALE_TO_WS;             // cursive units -> worksheet units
  const { paths, width } = cursiveLayout(text, disconnected);
  let out = '';
  for (const p of paths) {
    out += `<g transform="translate(${(p.x).toFixed(1)},0) scale(${k.toFixed(5)})">`
        +  `<path d="${p.d}" fill="${color}" stroke="none" fill-rule="nonzero"/>`
        +  `</g>`;
  }
  return { frag: out, width };  // width in worksheet units

// PTRACE: Poppins outlines for digits/punctuation/letters on address lines.
// Map so its x-height (xh) lands on the worksheet x-height (XH=470).
const PT_K = 470 / PTRACE.xh;     // poppins units -> worksheet units

function addressFragment(text, S) {
  // Render an address line as a single light-gray silhouette per glyph, style-aware.
  if (state.style === 'cursive') {
    return cursiveFragment(text, S);
  }
  // print modes -> Poppins outline, filled (avoids double-line from stroking both
  // edges of each letter's outline)
  let x = 0, out = '';
  for (const ch of text) {
    const g = PTRACE.glyphs[ch];
    if (!g) { x += 300 * PT_K; continue; }
    const [adv, d] = g;
    if (d) {
      out += `<g transform="translate(${x.toFixed(1)},0) scale(${PT_K.toFixed(5)})">`
          +  `<path d="${d}" fill="#d0d0d0" stroke="none" fill-rule="nonzero"/></g>`;
    }
    x += adv * PT_K;
  }
  return { frag: out, width: x };  // worksheet units
}

function addressWidth(text) {
  if (state.style === 'cursive') return cursiveLayout(text).width;
  let x = 0;
  for (const ch of text) {
    const g = PTRACE.glyphs[ch];
    x += g ? g[0] * PT_K : 300 * PT_K;
  }
  return x;
}


const UPM = 1000;
const BASE = 0, XH = 470, ASC = 700;

// ---- dashed rendering from stroke primitives ----
const STROKE_W = 50, DASH = '112 74', TITTLE_R = 40;

function arcD(cx, cy, rx, ry, a0, a1, n = 48) {
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const t = (a0 + (a1 - a0) * i / n) * Math.PI / 180;
    pts.push(`${(cx + rx * Math.cos(t)).toFixed(1)} ${(cy + ry * Math.sin(t)).toFixed(1)}`);
  }
  return 'M ' + pts.join(' L ');
}

function dashFragment(text, S, color = '#1c1c1c') {
  const scale = S / UPM;
  let x = 0;
  let out = '';
  let last = null;
  for (const ch of text) {
    if (ch === ' ') { x += (SPACE_ADV + TRACK) * scale; last = ch; continue; }
    const g = STROKE_FONT[ch];
    if (!g) continue;
    const [adv, strokes] = g;
    const [lsb, rsb] = BEARINGS[ch] || [0, 0];
    x += lsb * scale;
    const gx = x / scale;
    let inner = '';
    for (const s of strokes) {
      if (s[0] === 'L') {
        inner += `<path d="M ${s[1]} ${s[2]} L ${s[3]} ${s[4]}" fill="none" stroke="${color}" stroke-width="${STROKE_W}" stroke-dasharray="${DASH}" stroke-linecap="butt"/>`;
      } else if (s[0] === 'E') {
        inner += `<path d="${arcD(s[1], s[2], s[3], s[4], s[5], s[6])}" fill="none" stroke="${color}" stroke-width="${STROKE_W}" stroke-dasharray="${DASH}" stroke-linecap="butt"/>`;
      } else if (s[0] === 'P') {
        inner += `<circle cx="${s[1]}" cy="${s[2]}" r="${TITTLE_R}" fill="${color}"/>`;
      }
    }
    out += `<g transform="scale(${scale.toFixed(5)},${(-scale).toFixed(5)}) translate(${gx.toFixed(1)},0)">${inner}</g>`;
    x += (adv + rsb + TRACK) * scale;
    last = ch;
  }
  if (last !== null && last !== ' ') x -= TRACK * scale;
  return { frag: out, width: x };
}

function layoutText(text) {
  let x = 0;
  const all = [];
  let last = null;
  for (const ch of text) {
    if (ch === ' ') { x += SPACE_ADV + TRACK; last = ch; continue; }
    const g = GLYPH_DOTS[ch];
    if (!g) continue;
    const [adv, pts] = g;
    const [lsb, rsb] = BEARINGS[ch] || [0, 0];
    x += lsb;
    for (const [gx, gy] of pts) all.push([x + gx, gy]);
    x += adv + rsb + TRACK;
    last = ch;
  }
  if (last !== null && last !== ' ') x -= TRACK;
  return { pts: all, width: x };
}

// ============ Page rendering ============
const PAGE_W = 816, PAGE_H = 1056, X_LEFT = 60, LINE_W = 696;

const THEMES = [
  { name: 'Pink',  c: ['#F599B0', '#FED4DE', '#FEE195', '#ADE4DE'] },
  { name: 'Ocean', c: ['#82B4E8', '#CDE4F9', '#A8E3D0', '#FEE195'] },
  { name: 'Sage',  c: ['#9CC5A1', '#D7E8DA', '#FEE195', '#F4C7AB'] },
];

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function headerSvg(name, theme) {
  if (!name) return '';                       // alphabet/address pages: no name banner
  const up = name.toUpperCase();
  // Fit within the left ~480px: shrink for longer names, never overflow.
  const size = Math.max(34, Math.min(72, 480 / (up.length * 0.62)));
  let spans = '';
  for (let i = 0; i < up.length; i++) {
    const col = up[i] === ' ' ? '#000' : theme.c[i % 4];
    spans += `<tspan fill="${col}">${esc(up[i])}</tspan>`;
  }
  return `<text x="${X_LEFT}" y="115" xml:space="preserve" font-family="Poppins, sans-serif" font-weight="700" font-size="${size.toFixed(1)}" letter-spacing="2">${spans}</text>`;
}

function subtitleSvg(text, hasName) {
  // When there's no name banner, center the subtitle higher so the page isn't top-heavy-empty.
  const y = hasName ? 180 : 150;
  return `<text x="${PAGE_W / 2}" y="${y}" text-anchor="middle" font-family="Poppins, sans-serif" font-style="italic" font-size="34" fill="#2b2b3a">${esc(text)}</text>`;
}

function pageSvg({ name, subtitle, lineTexts, S, theme, isAddress, isAlphabet }) {
  const boxH = (ASC - BASE) / UPM * S;
  const dashFromBottom = (XH - BASE) / UPM * S;
  const dotR = DOT_R_EM * S;
  const yStart = 230, yEnd = 1012;
  const nLines = lineTexts.length;
  const gap = (yEnd - yStart - nLines * boxH) / (nLines - 1);

  let body = headerSvg(name, theme) + subtitleSvg(subtitle, !!name);
  const dotCacheLocal = {};

  let y = yStart;
  for (let i = 0; i < nLines; i++) {
    const bottom = y + boxH;
    const dashY = bottom - dashFromBottom;
    body += `<line x1="${X_LEFT}" y1="${y.toFixed(2)}" x2="${X_LEFT + LINE_W}" y2="${y.toFixed(2)}" stroke="#2b2b3a" stroke-width="1.6"/>`;
    body += `<line x1="${X_LEFT}" y1="${dashY.toFixed(2)}" x2="${X_LEFT + LINE_W}" y2="${dashY.toFixed(2)}" stroke="#bbbbbb" stroke-width="1.5" stroke-dasharray="7,7"/>`;
    body += `<line x1="${X_LEFT}" y1="${bottom.toFixed(2)}" x2="${X_LEFT + LINE_W}" y2="${bottom.toFixed(2)}" stroke="#2b2b3a" stroke-width="1.6"/>`;
    const t = lineTexts[i];
    if (t) {
      // Inset the glyph band inside the rules so a letter's top/bottom bar
      // never coincides with the cap-line or baseline ruling.
      const inset = 0.5 * STROKE_W / UPM * S;
      const Si = S * (boxH - 2 * inset) / boxH;
      const baseline = bottom - inset;
      if (isAddress) {
        const { frag, width } = addressFragment(t, Si);
        const wPx = width / UPM * Si;
        const startX = X_LEFT + (LINE_W - wPx) / 2;
        body += `<g transform="translate(${startX.toFixed(1)},${baseline.toFixed(1)}) scale(${(Si/UPM).toFixed(5)},${(-Si/UPM).toFixed(5)})">${frag}</g>`;
      } else if (state.style === 'dash') {
        const { frag, width } = dashFragment(t, Si);
        const startX = X_LEFT + (LINE_W - width) / 2;
        body += `<g transform="translate(${startX.toFixed(1)},${baseline.toFixed(1)})">${frag}</g>`;
      } else if (state.style === 'cursive') {
        const { frag, width } = cursiveFragment(t, Si, undefined, !!isAlphabet);
        const wPx = width / UPM * Si;
        const startX = X_LEFT + (LINE_W - wPx) / 2;
        // group: position at baseline, scale worksheet-units->px and flip y
        body += `<g transform="translate(${startX.toFixed(1)},${baseline.toFixed(1)}) scale(${(Si/UPM).toFixed(5)},${(-Si/UPM).toFixed(5)})">${frag}</g>`;
      } else {
        if (!dotCacheLocal[t]) dotCacheLocal[t] = layoutText(t);
        const { pts, width } = dotCacheLocal[t];
        const startX = X_LEFT + (LINE_W - width / UPM * Si) / 2;
        let c = '';
        for (const [gx, gy] of pts) {
          const px = startX + gx / UPM * Si;
          const py = baseline - gy / UPM * Si;
          c += `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${(DOT_R_EM * Si).toFixed(2)}" fill="#1c1c1c"/>`;
        }
        body += c;
      }
    }
    y += boxH + gap;
  }
  return `<svg viewBox="0 0 ${PAGE_W} ${PAGE_H}" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/>${body}</svg>`;
}

// ============ App state & wiring ============
const state = { theme: 0, lines: 8, alphabet: false, style: 'dash',
                address: false, addr: { street:'', city:'', stateAb:'', zip:'', phone:'' } };

// Bulk class list
let bulkList = []; // [{first, middle, last}]

function parseBulk(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  // Skip header row if it starts with "first" (case-insensitive)
  const dataLines = lines[0] && lines[0].toLowerCase().startsWith('first') ? lines.slice(1) : lines;
  return dataLines.map(line => {
    const parts = line.split(',').map(p => p.trim());
    // CSV columns: First, Middle, Last, Street, City, State, ZIP, Phone
    if (parts.length >= 2) {
      const first  = parts[0] || '';
      const middle = parts.length >= 3 ? (parts[1] || '') : '';
      const last   = parts.length >= 3 ? (parts[2] || '') : (parts[1] || '');
      const street = parts[3] || '';
      const city   = parts[4] || '';
      const stateAb= parts[5] || '';
      const zip    = parts[6] || '';
      const phone  = parts[7] || '';
      const hasAddr = street || city || stateAb || zip || phone;
      return { first, middle, last,
               addr: hasAddr ? { street: cleanAddr(street), city: cleanAddr(city),
                                 stateAb: cleanAddr(stateAb).toUpperCase(),
                                 zip: cleanAddr(zip), phone: cleanAddr(phone) } : null };
    }
    // Plain words fallback: no address data
    const words = line.split(/\s+/);
    if (words.length === 1) return { first: words[0], middle: '', last: '', addr: null };
    if (words.length === 2) return { first: words[0], middle: '', last: words[1], addr: null };
    return { first: words[0], middle: words.slice(1, -1).join(' '), last: words[words.length - 1], addr: null };
  }).map(p => ({
    first:  clean(p.first).value,
    middle: clean(p.middle).value,
    last:   clean(p.last).value,
    addr:   p.addr,
  })).filter(p => p.first || p.last);
}

const firstEl = document.getElementById('first');
const middleEl = document.getElementById('middle');
const lastEl = document.getElementById('last');
const sheetsEl = document.getElementById('sheets');
const brandEl = document.getElementById('brandName');
const warnEl = document.getElementById('charWarn');
const streetEl = document.getElementById('street');
const cityEl = document.getElementById('city');
const stateAbEl = document.getElementById('stateAb');
const zipEl = document.getElementById('zip');
const phoneEl = document.getElementById('phone');

function clean(raw) {
  const ok = raw.replace(/[^A-Za-z \-]/g, '');
  return { value: ok.replace(/\s+/g, ' '), removed: ok !== raw };
}

// Address fields allow digits and common address punctuation.
function cleanAddr(raw) {
  return raw.replace(/[^A-Za-z0-9 .,'#/&-]/g, '').replace(/\s+/g, ' ');
}

function buildPagesForPerson(first, middle, last, addrOverride) {
  const theme = THEMES[state.theme];
  const rep = t => Array(state.lines).fill(t);
  const pages = [{ subtitle: 'Name Practice', lines: rep(first) }];
  if (middle) pages.push({ subtitle: middle, lines: rep(`${first} ${middle}`) });
  if (last) pages.push({ subtitle: middle ? `${middle} ${last}` : last, lines: rep([first, middle, last].filter(Boolean).join(' ')) });
  pages.push({ subtitle: 'I can write my name!', lines: rep(null) });
  if (state.alphabet) {
    pages.push({ subtitle: 'Alphabet — Uppercase', noName: true, isAlphabet: true,
      lines: ['ABCDEFGHIJKLM', 'NOPQRSTUVWXYZ', 'ABCDEFGHIJKLM', 'NOPQRSTUVWXYZ',
              'ABCDEFGHIJKLM', 'NOPQRSTUVWXYZ', 'ABCDEFGHIJKLM', 'NOPQRSTUVWXYZ'] });
    pages.push({ subtitle: 'Alphabet — Lowercase', noName: true, isAlphabet: true,
      lines: ['abcdefghijklm', 'nopqrstuvwxyz', 'abcdefghijklm', 'nopqrstuvwxyz',
              'abcdefghijklm', 'nopqrstuvwxyz', 'abcdefghijklm', 'nopqrstuvwxyz'] });
    pages.push({ subtitle: 'Alphabet Practice — Uppercase', noName: true, lines: rep(null) });
    pages.push({ subtitle: 'Alphabet Practice — Lowercase', noName: true, lines: rep(null) });
  }
  // Use per-student address from CSV if provided, else fall back to shared address fields
  const a = addrOverride || state.addr;
  const useAddr = state.address && (addrOverride || (state.addr.street || state.addr.city));
  if (useAddr) {
    const cityLine = [a.city, a.stateAb].filter(Boolean).join(', ') + (a.zip ? ' ' + a.zip : '');
    const addrLines = [];
    if (a.street) addrLines.push(a.street);
    if (cityLine.trim()) addrLines.push(cityLine.trim());
    const lns = [];
    for (const al of addrLines) { lns.push(al); }
    if (a.phone) { lns.push(a.phone); }
    while (lns.length && lns.length < state.lines) lns.push(null);
    if (lns.length) pages.push({ subtitle: 'My Address', noName: true, isAddress: true, lines: lns.slice(0, Math.max(state.lines, lns.length)) });
  }

  const lineWidth = (t, isAddr, isAlpha) => {
    if (isAddr) return addressWidth(t);
    if (state.style === 'cursive') return cursiveLayout(t, !!isAlpha).width;
    return layoutText(t).width;
  };

  let maxW = 0;
  for (const p of pages) {
    for (const t of p.lines) {
      if (t) maxW = Math.max(maxW, lineWidth(t, p.isAddress, p.isAlphabet));
    }
  }
  const S = Math.min(85, (LINE_W - 24) / (maxW / UPM));

  return pages.map(p =>
    `<div class="sheet">${pageSvg({
      name: p.noName ? '' : first, subtitle: p.subtitle, lineTexts: p.lines, S, theme, isAddress: p.isAddress, isAlphabet: p.isAlphabet
    })}</div>`
  ).join('');
}

function buildPages() {
  const f = clean(firstEl.value.trim());
  const m = clean(middleEl.value.trim());
  const l = clean(lastEl.value.trim());
  warnEl.style.display = (f.removed || m.removed || l.removed) ? 'block' : 'none';
  warnEl.textContent = 'Letters, spaces, and hyphens only — other characters were skipped.';

  state.addr = {
    street: cleanAddr(streetEl.value.trim()),
    city: cleanAddr(cityEl.value.trim()),
    stateAb: cleanAddr(stateAbEl.value.trim()).toUpperCase(),
    zip: cleanAddr(zipEl.value.trim()),
    phone: cleanAddr(phoneEl.value.trim()),
  };

  const theme = THEMES[state.theme];

  // Bulk mode: generate packets for each person in the class list
  if (bulkList.length > 0) {
    brandEl.innerHTML = '';
    const label = `${bulkList.length} student${bulkList.length > 1 ? 's' : ''}`;
    brandEl.textContent = label;
    brandEl.style.color = theme.c[0];
    sheetsEl.innerHTML = bulkList.map(p => buildPagesForPerson(p.first, p.middle, p.last, p.addr)).join('');
    return;
  }

  const first = f.value, middle = m.value, last = l.value;

  // brand header mirrors the worksheet header
  brandEl.innerHTML = '';
  const showName = (first || 'NAME').toUpperCase();
  [...showName].forEach((ch, i) => {
    const s = document.createElement('span');
    s.textContent = ch;
    s.style.color = ch === ' ' ? 'transparent' : theme.c[i % 4];
    if (!first) s.style.opacity = '0.35';
    brandEl.appendChild(s);
  });

  if (!first) {
    sheetsEl.innerHTML = '<div class="empty-state">Type a <b>first name</b> above, or paste a class list below.</div>';
    return;
  }

  sheetsEl.innerHTML = buildPagesForPerson(first, middle, last);
}

// theme swatches
const swRow = document.getElementById('swatches');
THEMES.forEach((t, i) => {
  const b = document.createElement('button');
  b.className = 'swatch' + (i === state.theme ? ' sel' : '');
  b.setAttribute('role', 'radio');
  b.setAttribute('aria-label', t.name + ' theme');
  b.style.setProperty('--c1', t.c[0]);
  b.style.setProperty('--c2', t.c[1]);
  b.style.setProperty('--c3', t.c[2]);
  b.style.setProperty('--c4', t.c[3]);
  b.onclick = () => {
    state.theme = i;
    swRow.querySelectorAll('.swatch').forEach((el, j) => el.classList.toggle('sel', j === i));
    buildPages();
  };
  swRow.appendChild(b);
});

// lines per page
const segEl = document.getElementById('lineSeg');
[6, 7, 8].forEach(n => {
  const b = document.createElement('button');
  b.textContent = n;
  b.className = n === state.lines ? 'sel' : '';
  b.onclick = () => {
    state.lines = n;
    segEl.querySelectorAll('button').forEach(el => el.classList.toggle('sel', +el.textContent === n));
    buildPages();
  };
  segEl.appendChild(b);
});

let deb;
[firstEl, middleEl, lastEl, streetEl, cityEl, stateAbEl, zipEl, phoneEl].forEach(el =>
  el.addEventListener('input', () => { clearTimeout(deb); deb = setTimeout(buildPages, 160); })
);
document.querySelectorAll('#styleSeg button').forEach(b => {
  b.onclick = () => {
    state.style = b.dataset.style;
    document.querySelectorAll('#styleSeg button').forEach(el => el.classList.toggle('sel', el === b));
    buildPages();
  };
});
document.getElementById('alphaToggle').onchange = (e) => { state.alphabet = e.target.checked; buildPages(); };
document.getElementById('addrToggle').onchange = (e) => {
  state.address = e.target.checked;
  document.getElementById('addrInputs').style.display = e.target.checked ? 'block' : 'none';
  buildPages();
};
document.getElementById('printBtn').onclick = () => window.print();

// Bulk CSV wiring
const bulkInputEl = document.getElementById('bulkInput');
const bulkCountEl = document.getElementById('bulkCount');
const bulkFileEl  = document.getElementById('bulkFile');

function updateBulk() {
  const text = bulkInputEl.value.trim();
  bulkList = text ? parseBulk(text) : [];
  if (bulkList.length > 0) {
    bulkCountEl.style.display = 'block';
    bulkCountEl.textContent = `${bulkList.length} student${bulkList.length > 1 ? 's' : ''} detected — single-name fields ignored while list is active.`;
  } else {
    bulkCountEl.style.display = 'none';
  }
  buildPages();
}

bulkInputEl.addEventListener('input', () => { clearTimeout(deb); deb = setTimeout(updateBulk, 300); });

document.getElementById('bulkClear').onclick = () => {
  bulkInputEl.value = '';
  updateBulk();
};

// Sample CSV download
document.getElementById('sampleCsvBtn').onclick = () => {
  const rows = [
    'First,Middle,Last,Street,City,State,ZIP,Phone',
    'Alice,,Smith,123 Oak Lane,Springfield,IL,62701,555-0101',
    'Bob,James,Jones,456 Maple Ave,Shelbyville,IL,62565,',
    'Carol Jean,,Williams,,,,,',
    'David,,,,,,,',
  ];
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'class-list-sample.csv';
  a.click();
  URL.revokeObjectURL(a.href);
};

bulkFileEl.onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => { bulkInputEl.value = ev.target.result; updateBulk(); };
  reader.readAsText(file);
  bulkFileEl.value = ''; // allow re-upload of same file
};

buildPages();
</script>
