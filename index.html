<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Name Tracing Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2b2b3a;
    --paper: #fbf6f3;
    --card: #ffffff;
    --line: #ece2dd;
    --accent: #f0879f;
    --accent-soft: #fde9ee;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Poppins', 'Segoe UI', sans-serif;
  }

  /* ---------- App chrome ---------- */
  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }
  .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 26px;
  }
  .brand-name {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1.1;
    min-height: 50px;
    word-break: break-word;
  }
  .brand-sub {
    font-style: italic;
    font-size: 17px;
    color: #6f6a78;
  }
  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 26px;
    align-items: start;
  }
  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ---------- Controls ---------- */
  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px;
    position: sticky;
    top: 18px;
  }
  @media (max-width: 860px) {
    .panel { position: static; }
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: .4px;
    text-transform: uppercase;
    color: #8a8494;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 11px 13px;
    font: 500 16px 'Poppins', sans-serif;
    color: var(--ink);
    border: 1.5px solid var(--line);
    border-radius: 11px;
    background: #fffdfc;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus { border-color: var(--accent); }
  .hint { font-size: 12.5px; color: #a09aa8; margin-top: 4px; }

  .swatch-row { display: flex; gap: 10px; }
  .swatch {
    --c1: #f599b0; --c2: #fed4de; --c3: #fee195; --c4: #ade4de;
    width: 54px; height: 34px;
    border-radius: 9px;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    background:
      linear-gradient(90deg, var(--c1) 0 25%, var(--c2) 25% 50%, var(--c3) 50% 75%, var(--c4) 75% 100%);
  }
  .swatch.sel { border-color: var(--ink); }
  .swatch:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .seg { display: flex; gap: 6px; }
  .seg button {
    flex: 1;
    padding: 8px 0;
    font: 600 14px 'Poppins', sans-serif;
    color: var(--ink);
    background: #fffdfc;
    border: 1.5px solid var(--line);
    border-radius: 9px;
    cursor: pointer;
  }
  .seg button.sel {
    background: var(--accent-soft);
    border-color: var(--accent);
  }

  .print-btn {
    width: 100%;
    margin-top: 6px;
    padding: 14px 0;
    font: 700 16px 'Poppins', sans-serif;
    letter-spacing: .3px;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform .08s, background .15s;
  }
  .print-btn:hover { background: #e9758f; }
  .print-btn:active { transform: scale(.985); }
  .print-note {
    font-size: 12.5px;
    color: #a09aa8;
    text-align: center;
    margin-top: 9px;
  }

  /* ---------- Preview sheets ---------- */
  .sheets { display: flex; flex-direction: column; gap: 26px; }
  .sheet {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 1px 3px rgba(43,43,58,.10), 0 10px 28px rgba(43,43,58,.10);
    overflow: hidden;
  }
  .sheet svg { display: block; width: 100%; height: auto; }
  .empty-state {
    border: 2px dashed var(--line);
    border-radius: 18px;
    padding: 70px 30px;
    text-align: center;
    color: #a09aa8;
    font-size: 16px;
  }
  .empty-state b { color: var(--ink); }

  /* ---------- Print ---------- */
  @media print {
    @page { size: 8.5in 11in; margin: 0; }
    body { background: #fff; }
    .app { max-width: none; padding: 0; }
    .brand, .panel { display: none !important; }
    .layout { display: block; }
    .sheets { gap: 0; }
    .sheet {
      box-shadow: none;
      border-radius: 0;
      width: 8.5in;
      height: 11in;
      page-break-after: always;
    }
    .sheet:last-child { page-break-after: avoid; }
    .sheet svg { width: 8.5in; height: 11in; }
    .empty-state { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="brand">
    <div class="brand-name" id="brandName" aria-live="polite"></div>
    <div class="brand-sub">Name Tracing Studio &mdash; type a name, print the worksheet packet</div>
  </div>

  <div class="layout">
    <div class="panel">
      <div class="field">
        <label for="first">First name</label>
        <input id="first" type="text" value="Willa" maxlength="14" autocomplete="off">
      </div>
      <div class="field">
        <label for="middle">Middle name <span style="text-transform:none;font-weight:400">(optional)</span></label>
        <input id="middle" type="text" value="" maxlength="14" autocomplete="off">
      </div>
      <div class="field">
        <label for="last">Last name <span style="text-transform:none;font-weight:400">(optional)</span></label>
        <input id="last" type="text" value="" maxlength="14" autocomplete="off">
      </div>

      <div class="field">
        <label>Color theme</label>
        <div class="swatch-row" id="swatches" role="radiogroup" aria-label="Color theme"></div>
      </div>

      <div class="field">
        <label>Letter style</label>
        <div class="seg" id="styleSeg">
          <button data-style="dash" class="sel">Dashes</button>
          <button data-style="dot">Dots</button>
        </div>
      </div>

      <div class="field">
        <label>Practice lines per page</label>
        <div class="seg" id="lineSeg"></div>
      </div>

      <div class="field">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; text-transform:none; font-size:14px; font-weight:500; color:var(--ink);">
          <input type="checkbox" id="alphaToggle" style="width:16px; height:16px; accent-color:var(--accent);">
          Add alphabet practice pages
        </label>
      </div>

      <button class="print-btn" id="printBtn">Print worksheets</button>
      <div class="print-note">In the print dialog, choose &ldquo;Save as PDF&rdquo; to keep a copy.</div>
      <div class="hint" id="charWarn" style="color:#d4708a; display:none; margin-top:10px;"></div>
    </div>

    <div class="sheets" id="sheets"></div>
  </div>
</div>

const UPM = 1000;
const BASE = 0, XH = 470, ASC = 700;

// ---- dashed rendering from stroke primitives ----
const STROKE_W = 50, DASH = '112 74', TITTLE_R = 40;

function arcD(cx, cy, rx, ry, a0, a1, n = 48) {
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const t = (a0 + (a1 - a0) * i / n) * Math.PI / 180;
    pts.push(`${(cx + rx * Math.cos(t)).toFixed(1)} ${(cy + ry * Math.sin(t)).toFixed(1)}`);
  }
  return 'M ' + pts.join(' L ');
}

function dashFragment(text, S, color = '#1c1c1c') {
  const scale = S / UPM;
  let x = 0;
  let out = '';
  let last = null;
  for (const ch of text) {
    if (ch === ' ') { x += (SPACE_ADV + TRACK) * scale; last = ch; continue; }
    const g = STROKE_FONT[ch];
    if (!g) continue;
    const [adv, strokes] = g;
    const [lsb, rsb] = BEARINGS[ch] || [0, 0];
    x += lsb * scale;
    const gx = x / scale;
    let inner = '';
    for (const s of strokes) {
      if (s[0] === 'L') {
        inner += `<path d="M ${s[1]} ${s[2]} L ${s[3]} ${s[4]}" fill="none" stroke="${color}" stroke-width="${STROKE_W}" stroke-dasharray="${DASH}" stroke-linecap="butt"/>`;
      } else if (s[0] === 'E') {
        inner += `<path d="${arcD(s[1], s[2], s[3], s[4], s[5], s[6])}" fill="none" stroke="${color}" stroke-width="${STROKE_W}" stroke-dasharray="${DASH}" stroke-linecap="butt"/>`;
      } else if (s[0] === 'P') {
        inner += `<circle cx="${s[1]}" cy="${s[2]}" r="${TITTLE_R}" fill="${color}"/>`;
      }
    }
    out += `<g transform="scale(${scale.toFixed(5)},${(-scale).toFixed(5)}) translate(${gx.toFixed(1)},0)">${inner}</g>`;
    x += (adv + rsb + TRACK) * scale;
    last = ch;
  }
  if (last !== null && last !== ' ') x -= TRACK * scale;
  return { frag: out, width: x };
}

function layoutText(text) {
  let x = 0;
  const all = [];
  let last = null;
  for (const ch of text) {
    if (ch === ' ') { x += SPACE_ADV + TRACK; last = ch; continue; }
    const g = GLYPH_DOTS[ch];
    if (!g) continue;
    const [adv, pts] = g;
    const [lsb, rsb] = BEARINGS[ch] || [0, 0];
    x += lsb;
    for (const [gx, gy] of pts) all.push([x + gx, gy]);
    x += adv + rsb + TRACK;
    last = ch;
  }
  if (last !== null && last !== ' ') x -= TRACK;
  return { pts: all, width: x };
}

// ============ Page rendering ============
const PAGE_W = 816, PAGE_H = 1056, X_LEFT = 60, LINE_W = 696;

const THEMES = [
  { name: 'Pink',  c: ['#F599B0', '#FED4DE', '#FEE195', '#ADE4DE'] },
  { name: 'Ocean', c: ['#82B4E8', '#CDE4F9', '#A8E3D0', '#FEE195'] },
  { name: 'Sage',  c: ['#9CC5A1', '#D7E8DA', '#FEE195', '#F4C7AB'] },
];

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function headerSvg(name, theme) {
  const up = name.toUpperCase();
  const size = Math.min(72, 560 / (up.length * 0.68));
  let spans = '';
  for (let i = 0; i < up.length; i++) {
    const col = up[i] === ' ' ? '#000' : theme.c[i % 4];
    spans += `<tspan fill="${col}">${esc(up[i])}</tspan>`;
  }
  return `<text x="${X_LEFT}" y="115" xml:space="preserve" font-family="Poppins, sans-serif" font-weight="700" font-size="${size.toFixed(1)}" letter-spacing="2">${spans}</text>`;
}

function subtitleSvg(text) {
  return `<text x="${PAGE_W / 2}" y="180" text-anchor="middle" font-family="Poppins, sans-serif" font-style="italic" font-size="34" fill="#2b2b3a">${esc(text)}</text>`;
}

function pageSvg({ name, subtitle, lineTexts, S, theme }) {
  const boxH = (ASC - BASE) / UPM * S;
  const dashFromBottom = (XH - BASE) / UPM * S;
  const dotR = DOT_R_EM * S;
  const yStart = 230, yEnd = 1012;
  const nLines = lineTexts.length;
  const gap = (yEnd - yStart - nLines * boxH) / (nLines - 1);

  let body = headerSvg(name, theme) + subtitleSvg(subtitle);
  const dotCacheLocal = {};

  let y = yStart;
  for (let i = 0; i < nLines; i++) {
    const bottom = y + boxH;
    const dashY = bottom - dashFromBottom;
    body += `<line x1="${X_LEFT}" y1="${y.toFixed(2)}" x2="${X_LEFT + LINE_W}" y2="${y.toFixed(2)}" stroke="#2b2b3a" stroke-width="1.6"/>`;
    body += `<line x1="${X_LEFT}" y1="${dashY.toFixed(2)}" x2="${X_LEFT + LINE_W}" y2="${dashY.toFixed(2)}" stroke="#bbbbbb" stroke-width="1.5" stroke-dasharray="7,7"/>`;
    body += `<line x1="${X_LEFT}" y1="${bottom.toFixed(2)}" x2="${X_LEFT + LINE_W}" y2="${bottom.toFixed(2)}" stroke="#2b2b3a" stroke-width="1.6"/>`;
    const t = lineTexts[i];
    if (t) {
      // Inset the glyph band inside the rules so a letter's top/bottom bar
      // never coincides with the cap-line or baseline ruling.
      const inset = 0.5 * STROKE_W / UPM * S;
      const Si = S * (boxH - 2 * inset) / boxH;
      const baseline = bottom - inset;
      if (state.style === 'dash') {
        const { frag, width } = dashFragment(t, Si);
        const startX = X_LEFT + (LINE_W - width) / 2;
        body += `<g transform="translate(${startX.toFixed(1)},${baseline.toFixed(1)})">${frag}</g>`;
      } else {
        if (!dotCacheLocal[t]) dotCacheLocal[t] = layoutText(t);
        const { pts, width } = dotCacheLocal[t];
        const startX = X_LEFT + (LINE_W - width / UPM * Si) / 2;
        let c = '';
        for (const [gx, gy] of pts) {
          const px = startX + gx / UPM * Si;
          const py = baseline - gy / UPM * Si;
          c += `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${(DOT_R_EM * Si).toFixed(2)}" fill="#1c1c1c"/>`;
        }
        body += c;
      }
    }
    y += boxH + gap;
  }
  return `<svg viewBox="0 0 ${PAGE_W} ${PAGE_H}" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/>${body}</svg>`;
}

// ============ App state & wiring ============
const state = { theme: 0, lines: 8, alphabet: false, style: 'dash' };

const firstEl = document.getElementById('first');
const middleEl = document.getElementById('middle');
const lastEl = document.getElementById('last');
const sheetsEl = document.getElementById('sheets');
const brandEl = document.getElementById('brandName');
const warnEl = document.getElementById('charWarn');

function clean(raw) {
  const ok = raw.replace(/[^A-Za-z \-]/g, '');
  return { value: ok.replace(/\s+/g, ' '), removed: ok !== raw };
}

function buildPages() {
  const f = clean(firstEl.value.trim());
  const m = clean(middleEl.value.trim());
  const l = clean(lastEl.value.trim());
  warnEl.style.display = (f.removed || m.removed || l.removed) ? 'block' : 'none';
  warnEl.textContent = 'Letters, spaces, and hyphens only — other characters were skipped.';

  const first = f.value, middle = m.value, last = l.value;
  const theme = THEMES[state.theme];

  // brand header mirrors the worksheet header
  brandEl.innerHTML = '';
  const showName = (first || 'WILLA').toUpperCase();
  [...showName].forEach((ch, i) => {
    const s = document.createElement('span');
    s.textContent = ch;
    s.style.color = ch === ' ' ? 'transparent' : theme.c[i % 4];
    brandEl.appendChild(s);
  });

  if (!first) {
    sheetsEl.innerHTML = '<div class="empty-state">Type a <b>first name</b> to build the worksheet packet.</div>';
    return;
  }

  const rep = t => Array(state.lines).fill(t);
  const pages = [{ subtitle: 'Name Practice', lines: rep(first) }];
  if (middle) pages.push({ subtitle: middle, lines: rep(`${first} ${middle}`) });
  if (last) pages.push({ subtitle: middle ? `${middle} ${last}` : last, lines: rep([first, middle, last].filter(Boolean).join(' ')) });
  pages.push({ subtitle: 'I can write my name!', lines: rep(null) });
  if (state.alphabet) {
    pages.push({ subtitle: 'Alphabet \u2014 Uppercase',
      lines: ['ABCD', 'EFGH', 'IJKL', 'MNOP', 'QRST', 'UVWX', 'YZ', null] });
    pages.push({ subtitle: 'Alphabet \u2014 Lowercase',
      lines: ['abcd', 'efgh', 'ijkl', 'mnop', 'qrst', 'uvwx', 'yz', null] });
  }

  // unified size across every traced line of every page
  let maxW = 0;
  for (const p of pages) {
    for (const t of p.lines) {
      if (t) maxW = Math.max(maxW, layoutText(t).width);
    }
  }
  const S = Math.min(85, (LINE_W - 24) / (maxW / UPM));

  sheetsEl.innerHTML = pages.map(p =>
    `<div class="sheet">${pageSvg({
      name: first, subtitle: p.subtitle, lineTexts: p.lines, S, theme
    })}</div>`
  ).join('');
}

// theme swatches
const swRow = document.getElementById('swatches');
THEMES.forEach((t, i) => {
  const b = document.createElement('button');
  b.className = 'swatch' + (i === state.theme ? ' sel' : '');
  b.setAttribute('role', 'radio');
  b.setAttribute('aria-label', t.name + ' theme');
  b.style.setProperty('--c1', t.c[0]);
  b.style.setProperty('--c2', t.c[1]);
  b.style.setProperty('--c3', t.c[2]);
  b.style.setProperty('--c4', t.c[3]);
  b.onclick = () => {
    state.theme = i;
    swRow.querySelectorAll('.swatch').forEach((el, j) => el.classList.toggle('sel', j === i));
    buildPages();
  };
  swRow.appendChild(b);
});

// lines per page
const segEl = document.getElementById('lineSeg');
[6, 7, 8].forEach(n => {
  const b = document.createElement('button');
  b.textContent = n;
  b.className = n === state.lines ? 'sel' : '';
  b.onclick = () => {
    state.lines = n;
    segEl.querySelectorAll('button').forEach(el => el.classList.toggle('sel', +el.textContent === n));
    buildPages();
  };
  segEl.appendChild(b);
});

let deb;
[firstEl, middleEl, lastEl].forEach(el =>
  el.addEventListener('input', () => { clearTimeout(deb); deb = setTimeout(buildPages, 160); })
);
document.querySelectorAll('#styleSeg button').forEach(b => {
  b.onclick = () => {
    state.style = b.dataset.style;
    document.querySelectorAll('#styleSeg button').forEach(el => el.classList.toggle('sel', el === b));
    buildPages();
  };
});
document.getElementById('alphaToggle').onchange = (e) => { state.alphabet = e.target.checked; buildPages(); };
document.getElementById('printBtn').onclick = () => window.print();

buildPages();
